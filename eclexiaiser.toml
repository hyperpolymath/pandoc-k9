# eclexiaiser manifest for pandoc-k9

[project]
name = "pandoc-k9"

[[functions]]
name = "main"
source = "src/main.rs"
energy-budget-mj = 15

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
